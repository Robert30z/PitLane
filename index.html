<style>
/* ============ PITLANE DESIGN TOKENS — night-race world, dark by design ============ */
:root{
  --bg:#0B0D10;          /* asphalt */
  --panel:#14171D;       /* card */
  --panel2:#1B1F27;      /* raised card */
  --line:#272D38;        /* hairline */
  --text:#EEF1F6;
  --mut:#8B94A6;
  --red:#E8362D;         /* redline */
  --red-hot:#FF5A4E;
  --green:#3DD68C;       /* verified / good */
  --amber:#F2B33D;       /* boost / featured */
  --radius:14px;
  --disp:850 1em/1.02 "Segoe UI Variable Display","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)!important;color:var(--text);
  font:400 15px/1.5 "Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100%}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font:inherit;color:var(--text);background:var(--panel2);
  border:1px solid var(--line);border-radius:10px;padding:11px 13px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
input::placeholder,textarea::placeholder{color:#5D6675}
:focus-visible{outline:2px solid var(--red-hot);outline-offset:2px}
.pwwrap{position:relative}
.pwwrap input{padding-right:44px}
.eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:0;font-size:18px;cursor:pointer;padding:6px;opacity:.75;width:auto}
.eye:hover{opacity:1}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ APP SHELL ============ */
#app{max-width:500px;margin:0 auto;min-height:100vh;position:relative;
  background:var(--bg);box-shadow:0 0 80px rgba(232,54,45,.06)}
@media(min-width:560px){#app{border-left:1px solid var(--line);border-right:1px solid var(--line)}}
.screen{padding:0 16px 96px}
.mono{font-family:ui-monospace,"Cascadia Mono",Consolas,monospace;font-variant-numeric:tabular-nums}

/* display type — race-livery italic */
.disp{font:var(--disp);font-style:italic;text-transform:uppercase;letter-spacing:-.01em}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600}

/* checkered micro-flag, used sparingly */
.chq{height:8px;background:
  repeating-conic-gradient(#fff 0 25%,#0B0D10 0 50%) 0 0/8px 8px;opacity:.9;border-radius:2px}

/* top bar */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;background:linear-gradient(var(--bg) 82%,transparent)}
.logo{display:flex;align-items:baseline;gap:2px}
.logo b{font:var(--disp);font-style:italic;font-size:22px;letter-spacing:-.02em}
.logo b em{color:var(--red);font-style:italic}
.logo .chq{width:26px;height:7px;margin-left:7px;transform:skewX(-14deg)}

/* bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
  display:flex;align-items:flex-end;justify-content:space-around;z-index:40;
  background:linear-gradient(transparent,#0B0D10 26%);padding:20px 8px 12px}
nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut);
  font-size:10.5px;font-weight:600;letter-spacing:.04em;width:64px;padding:6px 0;border-radius:10px}
nav button.on{color:var(--text)}
nav button.on svg{stroke:var(--red-hot)}
nav svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
nav .sellbtn{width:58px;height:58px;border-radius:50%;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;margin-top:-16px;
  box-shadow:0 6px 22px rgba(232,54,45,.45);border:3px solid #0B0D10}
nav .sellbtn svg{width:26px;height:26px;stroke:#fff;stroke-width:2.4}

/* cards & buttons */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:13px 16px;border-radius:11px;font-weight:700;font-size:15px;
  background:var(--red);color:#fff;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text)}
.btn.line{background:none;border:1px solid var(--line);color:var(--mut)}
.btn.amber{background:var(--amber);color:#231A05}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:9px}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 14px;border-radius:999px;border:1px solid var(--line);
  color:var(--mut);font-size:13px;font-weight:600;background:var(--panel)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;letter-spacing:.03em}
.badge.v{background:rgba(61,214,140,.14);color:var(--green)}
.badge.f{background:rgba(242,179,61,.15);color:var(--amber)}
.badge.founder{background:rgba(232,54,45,.16);color:var(--red-hot)}
.badge.cat{background:var(--panel2);color:var(--mut);border:1px solid var(--line)}

/* listing grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;text-align:left;display:block;width:100%}
.lcard .ph{aspect-ratio:4/3;position:relative;overflow:hidden}
.lcard .info{padding:10px 11px 12px}
.price{font-family:ui-monospace,"Cascadia Mono",Consolas,monospace;font-weight:700;
  font-size:16px;font-variant-numeric:tabular-nums}
.lcard h3{font-size:13px;font-weight:600;color:#C6CDD9;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lcard .meta{font-size:11.5px;color:var(--mut);margin-top:3px;display:flex;gap:6px;align-items:center}

/* placeholder "spec-card" art (until sellers upload real shots) */
.art{position:absolute;inset:0;display:flex;align-items:flex-end;padding:10px;overflow:hidden}
.art .model{font:var(--disp);font-style:italic;font-size:26px;color:rgba(255,255,255,.92);
  text-shadow:0 2px 10px rgba(0,0,0,.5);letter-spacing:-.02em;text-transform:uppercase;line-height:.95}
.art .stripes{position:absolute;top:-20%;right:-8%;width:70%;height:140%;
  background:repeating-linear-gradient(115deg,rgba(255,255,255,.10) 0 14px,transparent 14px 34px);
  transform:skewX(-8deg)}
.art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.phototag{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;background:rgba(0,0,0,.55);color:#fff;padding:3px 7px;border-radius:5px}

/* featured strip */
.featrow{display:flex;gap:12px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.featrow::-webkit-scrollbar{display:none}
.featrow .lcard{flex:0 0 210px;border-color:rgba(242,179,61,.4)}

/* section head */
.shead{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.shead h2{font:var(--disp);font-style:italic;font-size:17px;text-transform:uppercase;letter-spacing:.01em}
.shead h2 s{color:var(--red);text-decoration:none}

/* forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.hint{font-size:12px;color:var(--mut);margin-top:5px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* wizard */
.steps{display:flex;gap:5px;margin:14px 0 20px}
.steps i{flex:1;height:4px;border-radius:2px;background:var(--line)}
.steps i.on{background:var(--red)}
.photoslots{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slot{aspect-ratio:4/3;border:1.5px dashed var(--line);border-radius:12px;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  color:var(--mut);font-size:12px;font-weight:600;overflow:hidden;background:var(--panel)}
.slot.done{border-style:solid;border-color:var(--green)}
.slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.slot .tag{position:relative;z-index:2;background:rgba(0,0,0,.55);padding:3px 8px;border-radius:6px;color:#fff}
.slot .demo{position:relative;z-index:2;font-size:11px;color:var(--red-hot);text-decoration:underline}
.slot input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:3}

/* events */
.ecard{display:flex;gap:14px;padding:14px;margin-bottom:12px}
.edate{flex:0 0 54px;text-align:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:8px 4px;height:fit-content}
.edate b{font:var(--disp);font-style:italic;font-size:20px;display:block}
.edate span{font-size:10.5px;letter-spacing:.1em;color:var(--mut);text-transform:uppercase}
.ecard h3{font-size:15.5px;font-weight:700}
.ecard .meta{font-size:12.5px;color:var(--mut);margin:4px 0 8px}

/* chat */
.thread{display:flex;gap:12px;padding:13px 14px;align-items:center}
.ava{width:44px;height:44px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font:var(--disp);font-style:italic;
  font-size:16px;color:var(--red-hot);flex:0 0 44px}
.msgs{display:flex;flex-direction:column;gap:8px;padding:14px 0}
.msg{max-width:78%;padding:9px 13px;border-radius:14px;font-size:14.5px;line-height:1.4}
.msg.me{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg time{display:block;font-size:10px;opacity:.65;margin-top:3px}
.composer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
  display:flex;gap:8px;padding:10px 14px 14px;background:var(--bg);border-top:1px solid var(--line);z-index:45}
.composer input{flex:1}
.composer button{flex:0 0 46px;height:46px;border-radius:50%;background:var(--red);color:#fff}

/* spec table */
.spec{width:100%;border-collapse:collapse;font-size:14px}
.spec td{padding:9px 0;border-bottom:1px solid var(--line)}
.spec td:first-child{color:var(--mut);font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.spec td:last-child{text-align:right;font-family:ui-monospace,Consolas,monospace}

/* modal + toast */
.overlay{position:fixed;inset:0;background:rgba(4,5,7,.72);z-index:60;display:flex;
  align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:500px;background:var(--panel);border:1px solid var(--line);
  border-radius:20px 20px 0 0;padding:20px 18px 26px;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);z-index:80;
  background:#1E232C;border:1px solid var(--line);color:var(--text);padding:11px 18px;
  border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);
  max-width:88%;text-align:center;display:none}

/* auth */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px 40px;position:relative;overflow:hidden}
.auth .glow{position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:420px;height:420px;
  border-radius:50%;background:radial-gradient(circle,rgba(232,54,45,.22),transparent 65%);pointer-events:none}
.wordmark{font:var(--disp);font-style:italic;font-size:52px;text-transform:uppercase;
  letter-spacing:-.03em;line-height:.92;text-wrap:balance}
.wordmark em{color:var(--red);font-style:italic}
.code6{display:flex;gap:8px;justify-content:center;margin:18px 0}
.code6 input{width:46px;height:56px;text-align:center;font-size:24px;font-weight:800;padding:0;
  font-family:ui-monospace,Consolas,monospace}
.rules{font-size:12.5px;color:var(--mut);display:flex;gap:9px;align-items:flex-start;margin:14px 0}
.rules input{width:17px;height:17px;flex:0 0 17px;margin-top:2px;accent-color:var(--red)}

.back{display:inline-flex;align-items:center;gap:6px;color:var(--mut);font-size:13.5px;
  font-weight:600;padding:6px 0;margin:8px 0 2px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat b{font:var(--disp);font-style:italic;font-size:20px;display:block}
.stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
.stars{color:var(--amber);letter-spacing:1px;font-size:13px}
.launchnote{background:linear-gradient(100deg,rgba(242,179,61,.13),rgba(232,54,45,.10));
  border:1px solid rgba(242,179,61,.35);border-radius:12px;padding:12px 14px;font-size:13px;margin:14px 0}
.launchnote b{color:var(--amber)}
.empty{text-align:center;color:var(--mut);padding:48px 20px;font-size:14px}

/* ============ RANK SYSTEM ============ */
.rankcard{padding:16px;margin:14px 0;position:relative;overflow:hidden}
.rankcard .rrow{display:flex;gap:14px;align-items:center}
.rankcard.master{border-color:rgba(255,211,77,.55);
  background:linear-gradient(135deg,#1A1408,#14171D 55%)}
.xpbar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:10px}
.xpbar i{display:block;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--red),var(--red-hot))}
.rankcard.master .xpbar i{background:linear-gradient(90deg,#B8860B,#FFD34D)}
.ranktitle{font:var(--disp);font-style:italic;font-size:19px;text-transform:uppercase}
.mission{display:flex;gap:12px;align-items:center;padding:12px 13px;margin-bottom:9px}
.mission .mi{flex:1;min-width:0}
.mission b{font-size:14px}
.mission p{font-size:12px;color:var(--mut);margin-top:1px}
.mission .xp{font-family:ui-monospace,Consolas,monospace;color:var(--amber);
  font-weight:700;font-size:13px;white-space:nowrap}
.mission.done{border-color:rgba(61,214,140,.4)}
.mission.pend{border-color:rgba(242,179,61,.4)}
.rchip{display:inline-flex;align-items:center;gap:4px;vertical-align:middle}
.masterbadge{background:linear-gradient(100deg,#B8860B,#FFD34D);color:#231A05;
  font-weight:800;letter-spacing:.06em}

/* ============ PRESTIGE WORLD ============ */
.lockbtn{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
  border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--amber)}
.lockbtn svg{width:14px;height:14px;stroke:var(--amber);fill:none;stroke-width:2}
.p-top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:14px 16px 10px;
  background:linear-gradient(var(--bg) 82%,transparent)}
.p-top .plogo{font:var(--disp);font-style:italic;font-size:20px;letter-spacing:-.02em}
.p-top .plogo em{color:var(--amber);font-style:italic}
nav.pnav button.on svg{stroke:var(--amber)}
nav.pnav .sellbtn{background:var(--amber);box-shadow:0 6px 22px rgba(242,179,61,.4)}
.gate{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;position:relative;overflow:hidden}
.gate .glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:400px;height:400px;
  border-radius:50%;background:radial-gradient(circle,rgba(242,179,61,.18),transparent 65%);pointer-events:none}
.lockring{width:70px;height:70px;border-radius:50%;border:2px solid var(--amber);display:flex;
  align-items:center;justify-content:center;margin-bottom:20px}
.lockring svg{width:30px;height:30px;stroke:var(--amber);fill:none;stroke-width:2}
.warn{background:rgba(232,54,45,.10);border:1px solid rgba(232,54,45,.4);border-radius:12px;
  padding:12px 14px;font-size:12.5px;color:#F3B4B0;margin:14px 0}
.warn b{color:var(--red-hot)}

/* car build card */
.buildcard{position:relative;border-radius:var(--radius);overflow:hidden;padding:0;background:var(--panel)}
.buildstage{aspect-ratio:16/10;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.buildstage .floor{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 118%,rgba(255,255,255,.10),transparent 60%),
  linear-gradient(#0d1014,#05070a)}
.buildstage .grid-lines{position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:34px 34px;
  transform:perspective(300px) rotateX(58deg) translateY(30%);transform-origin:bottom;opacity:.5}
.buildstage svg{position:relative;z-index:2;width:82%;filter:drop-shadow(0 16px 20px rgba(0,0,0,.5))}
.buildhud{position:absolute;top:10px;left:10px;z-index:3;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
.buildhud b{color:var(--text)}
.specgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.specgrid div{background:var(--panel);padding:11px 13px}
.specgrid span{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);display:block}
.specgrid b{font-family:ui-monospace,Consolas,monospace;font-size:15px}

/* swatches */
.swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}
.sw{width:34px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer;position:relative}
.sw.on{border-color:#fff;box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--amber)}
.pickrow{display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.pickrow::-webkit-scrollbar{display:none}
.pick{flex:0 0 auto;padding:9px 13px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
  font-size:13px;font-weight:600;color:var(--mut);white-space:nowrap}
.pick.on{border-color:var(--amber);color:var(--text);background:rgba(242,179,61,.08)}

/* titles & emblems */
.titlebadge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
  font-weight:800;letter-spacing:.05em;font-size:13px;border:1px solid var(--line);background:var(--panel2)}
.embgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.emb{aspect-ratio:1;border-radius:12px;border:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:6px;cursor:pointer;position:relative}
.emb.on{border-color:var(--amber);box-shadow:0 0 0 2px rgba(242,179,61,.25) inset}
.emb.lock{opacity:.35}
.emb .ename{font-size:9px;font-weight:800;letter-spacing:.04em;text-align:center;line-height:1.1}
.emblemart{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-style:italic;font-size:13px;color:#fff;transform:skewX(-6deg)}

/* clans */
.clanrow{display:flex;gap:12px;align-items:center;padding:13px 14px;margin-bottom:10px}
.clantag{font:var(--disp);font-style:italic;font-size:15px;padding:5px 10px;border-radius:8px;
  color:#fff;letter-spacing:.02em;flex:0 0 auto}

/* map */
.mapwrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);
  aspect-ratio:1/1.15;background:#0a0f14}
.mapwrap canvas{position:absolute;inset:0;width:100%;height:100%}
.pin{position:absolute;transform:translate(-50%,-100%);z-index:3;display:flex;flex-direction:column;
  align-items:center;cursor:pointer}
.pin .bub{background:#14171D;border:1.5px solid var(--amber);border-radius:8px;padding:3px 7px;font-size:10px;
  font-weight:800;white-space:nowrap;display:flex;align-items:center;gap:4px;box-shadow:0 3px 10px rgba(0,0,0,.5)}
.pin.me .bub{border-color:var(--red-hot);background:#1c1315}
.pin .stem{width:2px;height:9px;background:var(--amber)}
.pin.me .stem{background:var(--red-hot)}
.mapctl{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:12px}
.toggle{width:46px;height:26px;border-radius:14px;background:var(--line);position:relative;flex:0 0 46px;transition:.2s}
.toggle.on{background:var(--green)}
.toggle i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on i{left:23px}

/* admin */
.arow{display:flex;gap:10px;align-items:center;padding:11px 13px;margin-bottom:8px}
.arow .abtns{display:flex;gap:6px}
.abtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
  font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.abtn.up{color:var(--green)}.abtn.dn{color:var(--red-hot)}.abtn.pp{color:var(--amber);font-size:11px;width:auto;padding:0 9px}
.queueitem{padding:12px 14px;margin-bottom:9px}
.qbtns{display:flex;gap:8px;margin-top:9px}
.gallery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.gallery .add{aspect-ratio:1;border:1.5px dashed var(--line);border-radius:10px;display:flex;
  align-items:center;justify-content:center;color:var(--mut);font-size:26px;position:relative}
.gallery .add input{position:absolute;inset:0;opacity:0;cursor:pointer}
.pbanner{height:88px;border-radius:0 0 16px 16px;margin:0 -16px 0;position:relative;
  box-shadow:inset 0 -40px 40px -20px var(--bg)}
.cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ccard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);cursor:pointer;text-align:left}
.ccard.on{border-color:var(--amber);box-shadow:0 0 0 2px rgba(242,179,61,.25)}
.ccprev{display:block;height:46px}
.ccard .ename{display:block;padding:7px 10px;font-size:11px;font-weight:800;letter-spacing:.04em}

function award(mid){
  const u=S.users[S.me],m=MISSIONS.find(x=>x.id===mid);
  if(!m||u.master)return;
  u.completed=u.completed||{};
  if(m.once&&u.completed[mid])return;
  const before=lvlOf(u.xp||0).l;
  u.completed[mid]=(u.completed[mid]||0)+1;
  u.xp=(u.xp||0)+m.xp;
  const after=lvlOf(u.xp).l;
  save();
  setTimeout(()=>{
    if(after>before)toast('LEVEL UP — '+after+' · '+titleOf(after)+'  (+'+m.xp+' XP · '+m.t+')');
    else toast('+'+m.xp+' XP — '+m.t);
  },700);
  try{opsCheck()}catch(e){}
}
function prestigeUp(){
  const u=S.users[S.me];

  toast('PRESTIGE '+u.prestige+' — '+PNAMES[u.prestige]+'. New name color unlocked!');
}

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>'$'+Number(n).toLocaleString('en-US');
const stars=r=>'★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r));
const maskVIN=v=>v.length>6?'•••••••••••'+v.slice(-6):v;
/* ids coming back from the cloud get interpolated into onclick handlers — only accept safe ones */
const okId=s=>typeof s==='string'&&/^[A-Za-z0-9_:.\-]{1,64}$/.test(s);
const cleanRec=d=>(d&&okId(d.id))?d:null;
/* compress photos before storing/uploading — phone shots are 4-8MB, listings only need ~1600px */
function shrink(file){return new Promise(res=>{const rd=new FileReader();
  rd.onload=()=>{const img=new Image();
    img.onload=()=>{const MAX=1600,k=Math.min(1,MAX/Math.max(img.width,img.height));
      if(k>=1&&(file.size||0)<400000)return res(rd.result);
      const c=document.createElement('canvas');c.width=Math.round(img.width*k);c.height=Math.round(img.height*k);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.82))};
    img.onerror=()=>res(rd.result);img.src=rd.result};
  rd.readAsDataURL(file)})}

function syncWarn(){const n=Date.now();if(n-_syncWarned>30000){_syncWarned=n;toast('⚠️ Cloud sync issue — some changes may not have saved.')}}

let _navLock=false;
function pushNav(){if(_navLock)return;try{history.pushState({pl:1},'')}catch(e){}}

function go(name,arg){pushNav();view={name,arg};render();window.scrollTo(0,0)}

function render(){
  // guests can browse the market, events, listings, profiles and merch —
  // auth only gates DOING things (sell, message, RSVP, PRESTIGE…)
  if(!S.me&&!['auth-welcome','auth-signup','auth-verify','auth-login','auth-check','auth-reset','tab','listing','user','merch'].includes(view.name))view={name:'auth-welcome'};
  if(!S.me&&view.name==='tab'&&(tab==='chat'||tab==='profile'))return APP.innerHTML=shell(vGuestGate(tab),true);

  if(v==='auth-welcome')return APP.innerHTML=vWelcome();
  if(v==='auth-signup')return APP.innerHTML=vSignup();
  if(v==='auth-verify')return APP.innerHTML=vVerify();
  if(v==='auth-login')return APP.innerHTML=vLogin();
  if(v==='auth-check')return APP.innerHTML=vCheck();
  if(v==='auth-reset')return APP.innerHTML=vReset();
  if(v==='listing')return APP.innerHTML=shell(vListing(view.arg),false);
  if(v==='wizard')return APP.innerHTML=shell(vWizard(),false);
  if(v==='convo')return APP.innerHTML=shell(vConvo(view.arg),false);
  if(v==='event-new')return APP.innerHTML=shell(vEventNew(),false);
  if(v==='user')return APP.innerHTML=shell(vUser(view.arg),false);

  if(CLOUD){

    const {data,error}=await cloudSignup(first,last,nick,email,pw);

function waShare(text){window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank')}
function listingCard(lid){
  const l=S.listings.find(x=>x.id===lid);if(!l)return;
  const c=document.createElement('canvas');c.width=1080;c.height=1350;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,1080,1350);g.addColorStop(0,'#161a21');g.addColorStop(1,'#05070a');
  x.fillStyle=g;x.fillRect(0,0,1080,1350);
  x.fillStyle='#E8362D';x.fillRect(0,0,1080,16);
  const draw=()=>{
    x.fillStyle='rgba(5,7,10,.55)';x.fillRect(0,690,1080,660);
    x.font='italic 800 52px "Segoe UI",sans-serif';x.fillStyle='#EEF1F6';x.fillText('PIT',80,120);
    x.fillStyle='#E8362D';x.fillText('LANE',80+x.measureText('PIT').width,120);
    x.fillStyle='#3DD68C';x.font='800 96px "Segoe UI",sans-serif';x.fillText(fmt(l.price),80,860);
    x.fillStyle='#EEF1F6';x.font='700 52px "Segoe UI",sans-serif';
    const t=l.title.length>26?l.title.slice(0,25)+'…':l.title;x.fillText(t,80,940);
    x.fillStyle='#8B94A6';x.font='500 40px "Segoe UI",sans-serif';x.fillText(l.loc,80,1005);
    if(!l.cat||l.cat!=='parts'){
      x.fillStyle='#C6CDD9';x.font='600 38px "Segoe UI",sans-serif';
      x.fillText((l.miles?l.miles.toLocaleString()+' mi':'')+(l.titleStatus?'  ·  '+String(l.titleStatus).toUpperCase()+' TITLE':''),80,1075);
    }
    x.fillStyle='#F2B33D';x.font='700 34px "Segoe UI",sans-serif';
    x.fillText('6 FOTOS REALES · VIN · SPECS COMPLETOS',80,1180);
    x.fillStyle='#8B94A6';x.font='500 34px "Segoe UI",sans-serif';x.fillText('robert30z.github.io/PitLane',80,1290);
    try{const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='pitlane-'+String(l.id).slice(0,8)+'.png';a.click();
      toast('Story card saved 📸');}catch(e){toast('Could not save card here.')}
  };
  const src=(l.photos&&(l.photos[SHOTS[0]]||l.photos[Object.keys(l.photos)[0]]))||'';
  if(src){const im=new Image();im.crossOrigin='anonymous';
    im.onload=()=>{const r=Math.max(1080/im.width,900/im.height),w=im.width*r,h=im.height*r;
      x.drawImage(im,(1080-w)/2,0,w,h);draw()};
    im.onerror=draw;im.src=src;}
  else draw();
}
let _viewed={};
function bumpView(l){
  if(l.seller===S.me)return;                 // don't count the owner's own opens
  if(_viewed[l.id])return;_viewed[l.id]=1;   // once per session
  l.views=(l.views||0)+1;save();
  if(CLOUD)cloudBumpView(l.id);
}
function markSold(lid){const l=S.listings.find(x=>x.id===lid);l.sold=!l.sold;
  if(l.sold){const s=S.users[l.seller];s.sales=(s.sales||0)+1;}else{const s=S.users[l.seller];s.sales=Math.max(0,(s.sales||0)-1);}
  save();if(CLOUD)cloudUpdateListing(l);
  render();toast(l.sold?'Marked SOLD 🏁 — buyers can now review you.':'Relisted.');}
function msgSeller(lid){
  if(needAuth('Create your free account to message the seller.'))return;
  const l=S.listings.find(x=>x.id===lid);
  let t=S.threads.find(t=>t.listing===lid&&t.users.includes(S.me));
  // deterministic id so both sides land in the same thread across devices
  if(!t){t={id:'t_'+lid+'_'+S.me,listing:lid,users:[S.me,l.seller],msgs:[]};S.threads.unshift(t);save();}
  go('convo',t.id);
}

const REPORT_REASONS=['Stock or stolen photos','Wrong title status / VIN','Scam or off-platform payment push','Stolen vehicle or parts','Other'];
function sendReport(lid,ri){
  const l=S.listings.find(x=>x.id===lid);
  const r={id:'rp'+Date.now(),listing:lid,listingTitle:l?l.title:'?',reason:REPORT_REASONS[ri]||'Other',

function isFlagged(lid){return !!(S.flags&&S.flags[lid])}
function flagListing(lid,on){
  S.flags=S.flags||{};
  if(on){S.flags[lid]={by:S.me,t:Date.now()};if(CLOUD)cloudPut('flag',lid,{id:lid,listing:lid,by:S.me,t:Date.now()});}
  else{delete S.flags[lid];if(CLOUD)cloudDel('flag',lid);}
  save();render();toast(on?'⚫ Listing black-flagged — hidden from the market.':'Flag lifted — listing is back.');

function dismissReport(rid){
  S.reports=(S.reports||[]).filter(r=>r.id!==rid);save();
  if(CLOUD)cloudDel('report',rid);

function wNext1(){

  if(W.cat==='parts'&&!(d.fitment||'').trim())return toast('What does it fit? Put "Universal" if anything.');
  if(!d.model)return toast('Add the short model tag.');
  if(!d.price||isNaN(+d.price)||+d.price<=0)return toast('Enter a real asking price.');
  if(!d.loc)return toast('Where is it located?');
  W.step=2;render();
}
function decodeVIN(){
  const v=(W.data.vin||'').toUpperCase().replace(/\s/g,'');
  if(v.length<11)return toast('Enter the full VIN first (17 chars for road vehicles).');
  const make=WMI[v.slice(0,3)]||WMI[v.slice(0,2)]||null;
  const year=VINYEAR[v[9]]||null;
  if(!make&&!year)return toast('Couldn\'t read that VIN — double-check it.');
  W.data.vinInfo=(year?year+' ':'')+(make||'Unknown make');
  if(make&&year&&(!W.data.title||W.data.title.trim().length<6))W.data.title=year+' '+make+' ';
  render();
  toast('Decoded: '+W.data.vinInfo+(make&&year?' — full decode via NHTSA comes with phase 2':''));
}
function wNext2(){
  const d=W.data;
  if(W.cat==='parts'){
    if(!(d.vin||'').trim())d.vin='N/A';
    d.miles=0;d.titleStatus='n/a';if(!d.cond)d.cond=PART_CONDS[0];
    W.step=3;render();return;
  }
  if(!d.vin||d.vin.trim().length<5)return toast('VIN / serial is required — that\'s the legit check.');
  if(d.miles===undefined||d.miles==='')return toast('Enter miles (0 if it doesn\'t apply).');
  if(!d.titleStatus)d.titleStatus='clean';
  W.step=3;render();
}

function sendMsg(tid){
  const el=$('#cmp'),txt=el.value.trim();if(!txt)return;
  const t=S.threads.find(x=>x.id===tid);
  const now=new Date(),hh=((now.getHours()+11)%12+1),mm=String(now.getMinutes()).padStart(2,'0'),
        ap=now.getHours()>=12?'PM':'AM';
  const msg={id:'dm'+Date.now()+Math.random().toString(36).slice(2,5),from:S.me,text:txt,t:hh+':'+mm+' '+ap,ts:Date.now()};
  t.msgs.push(msg);
  save();award('first_msg');render();
  if(CLOUD){cloudPut('dm',msg.id,Object.assign({thread:t.id,listing:t.listing,users:t.users},msg));
    const rcpt=(t.users||[]).find(u=>u!==S.me);
    sendPush(rcpt,'💬 '+((S.users[S.me]||{}).nick||'New message'),txt.slice(0,90));return;}
  // demo-only canned reply — never fires against real accounts
  const other=t.users.find(u=>u!==S.me);
  if(other&&S.users[other]&&!t._replied){t._replied=true;
    setTimeout(()=>{t.msgs.push({from:other,text:'Got it — let me get back to you in a bit. 👍',t:hh+':'+mm+' '+ap});
      save();if(view.name==='convo'&&view.arg===tid)render();},1400);}
}
function applyDM(d){ // fold a cloud DM row into local threads (only threads I'm part of)
  d=cleanRec(d);if(!d||!Array.isArray(d.users)||!d.users.includes(S.me)||!okId(d.thread||''))return false;
  let t=S.threads.find(x=>x.id===d.thread);
  if(!t){t={id:d.thread,listing:d.listing,users:d.users,msgs:[]};S.threads.unshift(t);}
  if(t.msgs.some(m=>m.id===d.id))return false;
  t.msgs.push({id:d.id,from:d.from,text:d.text,t:d.t,ts:d.ts});
  t.msgs.sort((a,b)=>(a.ts||0)-(b.ts||0));
  return true;
}

function reviewsBlock(u,uid,self){
  const revs=u.reviews||[];const avg=revs.length?(revs.reduce((a,r)=>a+r.stars,0)/revs.length):0;
  return '<div class="shead"><h2>Reviews</h2>'+(revs.length?'<span class="stars">'+stars(avg)+' '+avg.toFixed(1)+'</span>':'<span class="hint">none yet</span>')+'</div>'+
  (!self&&S.me?'<button class="btn ghost sm" style="margin-bottom:10px" onclick="reviewModal(\''+uid+'\')">★ Leave a review</button>':'')+
  (revs.length?revs.slice(0,6).map(r=>{const f=S.users[r.from]||{nick:r.fromNick||'?'};
    return '<div class="card" style="padding:11px 13px;margin-bottom:8px"><div style="display:flex;justify-content:space-between"><b>'+nn(f)+'</b><span class="stars">'+stars(r.stars)+'</span></div>'+
    (r.text?'<p style="font-size:13px;color:#C6CDD9;margin-top:4px">'+esc(r.text)+'</p>':'')+'</div>';
  }).join(''):'');
}
let reviewStars=5;
function reviewModal(uid){
  reviewStars=5;
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML='<div class="sheet"><h2 class="disp" style="font-size:20px">Review '+nn(S.users[uid])+'</h2>'+
  '<p class="hint" style="margin:8px 0 10px">Leave this after a real deal or a race. Keep it honest.</p>'+
  '<div id="rvstars" style="font-size:34px;letter-spacing:6px;color:var(--amber);cursor:pointer;text-align:center;margin:6px 0">'+
  [1,2,3,4,5].map(n=>'<span onclick="setRvStars('+n+')">★</span>').join('')+'</div>'+
  '<div class="field"><label>Comment</label><textarea id="rvtext" rows="3" placeholder="How was the deal / the race?"></textarea></div>'+
  '<button class="btn amber" onclick="submitReview(\''+uid+'\')">Post review</button>'+
  '<button class="btn line" style="margin-top:8px" onclick="this.closest(\'.overlay\').remove()">Cancel</button></div>';
  document.body.appendChild(ov);
}
function setRvStars(n){reviewStars=n;const box=$('#rvstars');if(box)[...box.children].forEach((s,i)=>s.style.opacity=i<n?'1':'.3');}
function submitReview(uid){
  const u=S.users[uid];u.reviews=u.reviews||[];
  const rv={from:S.me,fromNick:(S.users[S.me]||{}).nick||'',to:uid,stars:reviewStars,text:$('#rvtext').value.trim(),t:Date.now()};
  u.reviews=u.reviews.filter(r=>r.from!==S.me);u.reviews.unshift(rv);   // one review per reviewer — reposting updates it
  u.rating=u.reviews.reduce((a,r)=>a+r.stars,0)/u.reviews.length;
  save();if(CLOUD){cloudPut('review',uid+':'+S.me,rv);
    sendPush(uid,'★ New review',(rv.fromNick||'Someone')+' left you a '+rv.stars+'-star review');}
  document.querySelector('.overlay').remove();render();toast('Review posted. Trust built. ★');
}
function applyReview(d){ // attach a cloud review to its target + recompute rating
  if(!d||!d.to||!S.users[d.to])return;
  const u=S.users[d.to];u.reviews=(u.reviews||[]).filter(r=>r.from!==d.from);
  u.reviews.unshift(d);u.reviews.sort((a,b)=>(b.t||0)-(a.t||0));
  u.rating=u.reviews.reduce((a,r)=>a+r.stars,0)/u.reviews.length;
}

function opStat(u,k){
  const races=u.races||{wins:0,losses:0};
  switch(k){
    case 'listings': return Math.max(S.listings.filter(l=>l.seller===u.id).length,((u.completed||{}).first_listing?1:0));
    case 'sold': return u.sales||0;
    case 'msgs': return ((u.completed||{}).first_msg||0);
    case 'rsvp': return ((u.completed||{}).rsvp||0);
    case 'garage': return (u.garage||[]).length;
    case 'wins': return races.wins||0;
    case 'spots': return Object.keys(u.spotShots||{}).length;
    case 'clan': return u.clan?1:0;
    case 'chat': return S.paddockChat.filter(m=>m.from===u.id).length;
    case 'trophies': return (u.trophies||[]).length;
    case 'level': return u.master?MAXLVL:lvlOf(u.xp||0).l;
  }
  return 0;
}
function opsCheck(){
  const u=S.me&&S.users[S.me];if(!u||u.master)return;
  u.opsDone=u.opsDone||{};u.opCards=u.opCards||[];
  let hit=false;
  OPS.forEach(tier=>tier.ops.forEach(op=>{
    if(u.opsDone[op.id])return;
    if(opStat(u,op.stat)>=op.need){
      u.opsDone[op.id]=Date.now();hit=true;
      if(op.xp)u.xp=(u.xp||0)+op.xp;
      if(op.reward){
        if(op.reward.card&&u.opCards.indexOf(op.reward.card)<0)u.opCards.push(op.reward.card);
        if(op.reward.emblem){u.unlockedEmblems=u.unlockedEmblems||[];
          if(!u.unlockedEmblems.some(e=>e[0]===op.reward.emblem[0]))u.unlockedEmblems.push(op.reward.emblem);}
      }
      notify('🎖️ OP COMPLETE — '+op.t+(op.xp?' (+'+op.xp+' XP)':'')+(op.reward?' · '+op.reward.name+' UNLOCKED':''));
      setTimeout(()=>toast('🎖️ OP COMPLETE — '+op.t+(op.reward?' · '+op.reward.name+' unlocked':'')),400);
    }
  }));
  if(hit)save();
}
function opStars(n,c){let s='';for(let i=0;i<3;i++)s+='<span style="color:'+(i<n?c:'#3a3f4a')+'">★</span>';return s}

  '<div style="flex:1;min-width:0"><b class="disp" style="font-size:17px;letter-spacing:.02em">SPEC OPS</b>'+

function brandOf(name){return CARBRANDS.find(x=>x.b===name)}
function garageBrands(u){return [...new Set((u.garage||[]).map(g=>g.brand))].map(brandOf).filter(Boolean)}
function unlockedTitles(u){
  const t=[titleOf(u.master?MAXLVL:lvlOf(u.xp||0).l)];
  if(u.master){ // Master: everything unlocked
    ['Master of the Grid','The Founder','Grid King','Podium Finisher','Track Rat'].forEach(x=>t.push(x));
    CARBRANDS.forEach(b=>t.push(b.title));
    return [...new Set(t)];
  }
  if(u.founder)t.push('The Founder');
  garageBrands(u).forEach(b=>t.push(b.title));
  (u.unlockedTitles||[]).forEach(x=>t.push(x));
  return [...new Set(t)];
}
function unlockedEmblems(u){
  const e=[];
  if(u.master){ // Master: every emblem in the game
    e.push(['CROWN','#FFD34D'],['APEX','#FF5A4E'],['TUNED','#3DD68C'],['ROOKIE','#8B94A6']);
    CARBRANDS.forEach(b=>b.emblems.forEach(nm=>e.push([nm,b.c])));
    const seen={};return e.filter(([n])=>seen[n]?false:(seen[n]=1));
  }
  const L=lvlOf(u.xp||0).l;
  if(L>=1)e.push(['ROOKIE','#8B94A6']);
  if(L>=10)e.push(['TUNED','#3DD68C']);
  if(L>=20)e.push(['APEX','#FF5A4E']);
  garageBrands(u).forEach(b=>b.emblems.forEach(nm=>e.push([nm,b.c])));
  (u.unlockedEmblems||[]).forEach(x=>e.push(x));
  const seen={};return e.filter(([n])=>seen[n]?false:(seen[n]=1));
}
function unlockedCards(u){
  const L=u.master?MAXLVL:lvlOf(u.xp||0).l;
  let list=CARDS.filter(c=>u.master||(c.min&&L>=c.min));
  if(typeof isPro==='function'&&isPro(u))list=list.concat(PRO_CARDS);
  const seasonDone=typeof SEASON!=='undefined'&&SEASON.spots.every(s=>u.spotShots&&u.spotShots[s]);
  if(typeof SEASON!=='undefined'&&(u.master||(typeof isPro==='function'&&isPro(u))||seasonDone))list.push(SEASON.card);
  // Spec-Ops exclusives — earned by clearing operations, master gets all
  if(typeof OPS_CARDS!=='undefined'){
    if(u.master)list=list.concat(OPS_CARDS);
    else (u.opCards||[]).forEach(id=>{const c=OPS_CARDS.find(x=>x.id===id);if(c&&list.indexOf(c)<0)list.push(c);});
  }
  return list;
}
function cardCss(u){const id=u.eqCard;const all=CARDS.concat(typeof PRO_CARDS!=='undefined'?PRO_CARDS:[],typeof SEASON!=='undefined'?[SEASON.card]:[],typeof OPS_CARDS!=='undefined'?OPS_CARDS:[]);
  const c=all.find(x=>x.id===id)||unlockedCards(u).slice(-1)[0]||CARDS[0];return c.css}

function carSVG(b){
  const paint=b.paint||'#E8362D',rim=b.rimC||'#C9CFD8',glass='#0d1b2a';
  const st=b.stance||'Stock',drop=st==='Slammed'?12:st==='Lowered'?7:st==='Lifted'?-10:0;
  const moto=(brandOf(b.brand)||{}).t==='moto';
  if(moto){
    return '<svg viewBox="0 0 400 200" role="img" aria-label="motorcycle">'+
    '<circle cx="96" cy="150" r="42" fill="#111" stroke="#333" stroke-width="3"/><circle cx="96" cy="150" r="20" fill="none" stroke="'+rim+'" stroke-width="5"/>'+
    '<circle cx="308" cy="150" r="42" fill="#111" stroke="#333" stroke-width="3"/><circle cx="308" cy="150" r="20" fill="none" stroke="'+rim+'" stroke-width="5"/>'+
    '<path d="M120 150 L180 120 L250 120 L288 150" stroke="#222" stroke-width="10" fill="none"/>'+
    '<path d="M150 122 Q190 70 250 90 L280 120 Q250 128 200 128 Q170 132 150 122Z" fill="'+paint+'"/>'+
    '<path d="M250 92 Q280 88 300 108 L300 122 L280 120Z" fill="'+glass+'"/>'+
    '<path d="M120 150 Q118 128 150 122" stroke="'+paint+'" stroke-width="8" fill="none"/></svg>';
  }
  const by=118+ (drop<0?0:drop);           // body baseline shift for lowering
  const lift=drop<0?-drop:0;
  return '<svg viewBox="0 0 400 200" role="img" aria-label="'+esc(b.brand+' '+b.model)+'">'+
  // wheels
  '<g>'+
  '<circle cx="98" cy="'+(150-lift)+'" r="34" fill="#0d0f12" stroke="#2a2e35" stroke-width="3"/>'+
  '<circle cx="98" cy="'+(150-lift)+'" r="18" fill="none" stroke="'+rim+'" stroke-width="4"/>'+
  spokes(98,150-lift,rim)+
  '<circle cx="304" cy="'+(150-lift)+'" r="34" fill="#0d0f12" stroke="#2a2e35" stroke-width="3"/>'+
  '<circle cx="304" cy="'+(150-lift)+'" r="18" fill="none" stroke="'+rim+'" stroke-width="4"/>'+
  spokes(304,150-lift,rim)+'</g>'+
  // body
  '<path d="M26,'+(by)+' Q26,104 46,101 L92,96 Q110,66 152,60 L176,58 Q214,40 256,49 Q290,56 305,73 L338,99 Q368,103 374,117 L374,'+(by+6)+' Q374,'+(by+14)+' 364,'+(by+14)+' L40,'+(by+14)+' Q26,'+(by+14)+' 26,'+(by)+' Z" fill="'+paint+'" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>'+
  // greenhouse
  '<path d="M150,64 Q188,48 246,55 L292,74 L178,74 Z" fill="'+glass+'" opacity=".92"/>'+
  '<path d="M182,70 L246,58 L246,74 Z" fill="rgba(255,255,255,.06)"/>'+
  // highlight
  '<path d="M60,'+(by-4)+' L330,'+(by-4)+'" stroke="rgba(255,255,255,.18)" stroke-width="2" fill="none"/>'+
  '<rect x="120" y="'+(by+2)+'" width="160" height="3" fill="rgba(0,0,0,.25)"/></svg>';
}
function spokes(cx,cy,c){let s='';for(let i=0;i<6;i++){const a=i*Math.PI/3;
  s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+16*Math.cos(a))+'" y2="'+(cy+16*Math.sin(a))+'" stroke="'+c+'" stroke-width="2.5"/>'}
  return s+'<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="'+c+'"/>'}

function logRace(eid){

function acceptChallenge(id){const c=S.challenges.find(x=>x.id===id);c.status='accepted';save();if(CLOUD)cloudPut('challenge',c.id,c);render();toast('Challenge accepted — settle it at '+c.venue);}

function awardUser(uid,mid){
  const u=S.users[uid],m=MISSIONS.find(x=>x.id===mid);
  if(!m||!u||u.master)return;
  u.completed=u.completed||{};

}
/* ---- inspection passes (anti-screenshot: rotating code + live clock) ---- */
function insBadge(ev,uid){const ins=(ev.inspections||{})[uid];
  if(!ins)return '<span class="badge cat">⧗ AWAITING INSPECTION</span>';
  return ins.status==='approved'?'<span class="badge v">✓ APPROVED TO RACE</span>'
    :'<span class="badge" style="background:rgba(232,54,45,.16);color:var(--red-hot)">✕ NOT APPROVED</span>';
}
function inspect(eid,uid,ok){
  const ev=S.events.find(e=>e.id===eid);ev.inspections=ev.inspections||{};
  ev.inspections[uid]={status:ok?'approved':'failed',seed:Math.random().toString(36).slice(2,10)+uid,by:S.me,at:Date.now()};
  save();render();toast((ok?'✓ Approved':'✕ Failed')+' — '+(S.users[uid]||{}).nick+'\'s pass updated');
}
function passHash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function passCode(seed){const w=Math.floor(Date.now()/15000);return String(passHash(seed+'|'+w)%1000000).padStart(6,'0')}
let passTimer=null;
function showPass(eid){
  const ev=S.events.find(e=>e.id===eid),u=S.users[S.me],ins=(ev.inspections||{})[u.id];
  const car=(u.garage&&u.garage[0])?(u.garage[0].year+' '+u.garage[0].brand+' '+u.garage[0].model):'—';
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=e=>{if(e.target===ov){clearInterval(passTimer);ov.remove()}};
  document.body.appendChild(ov);
  function draw(){
    const ok=ins&&ins.status==='approved',fail=ins&&ins.status==='failed';
    const bg=ok?'#0d2a17':fail?'#2a0d0d':'#241d08',bd=ok?'#3DD68C':fail?'#E8362D':'#F2B33D';
    ov.innerHTML='<div class="sheet" style="max-width:440px;text-align:center;background:'+bg+';border:2px solid '+bd+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="plogo" style="font-size:16px">PIT<em style="color:'+bd+'">LANE</em></div><span class="hint">INSPECTION PASS</span></div>'+
    '<div class="ava" style="width:64px;height:64px;font-size:24px;margin:0 auto 8px;border:2px solid '+bd+'">'+esc(u.nick[0])+'</div>'+
    '<div class="disp" style="font-size:22px">'+nn(u)+'</div>'+
    '<div class="hint mono">'+esc(u.profileNo)+' · '+esc(car)+'</div>'+
    '<div class="hint" style="margin-top:2px">'+esc(ev.title)+'</div>'+
    '<div style="margin:16px 0;padding:16px;border-radius:14px;background:rgba(0,0,0,.30)">'+
    (ok?'<div class="disp" style="font-size:30px;color:#3DD68C">✓ APPROVED<br>TO RACE</div>'
      :fail?'<div class="disp" style="font-size:30px;color:#FF5A4E">✕ NOT<br>APPROVED</div>'
      :'<div class="disp" style="font-size:24px;color:#F2B33D">⧗ AWAITING<br>INSPECTION</div>')+
    (ok?'<div style="margin-top:14px"><div class="hint" style="letter-spacing:.12em">LIVE VERIFICATION CODE</div>'+
      '<div class="mono" style="font-size:38px;font-weight:800;letter-spacing:6px;color:#3DD68C">'+passCode(ins.seed)+'</div>'+
      '<div style="display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px"><span style="width:9px;height:9px;border-radius:50%;background:#3DD68C;animation:pulse 1s infinite"></span><span class="hint mono">VALID · '+esc(new Date().toLocaleTimeString())+'</span></div></div>':'')+
    '</div>'+
    (ok?'<p class="hint">Officials: the driver\'s face must match this name, and the code + clock must be <b>live-updating</b>. A screenshot freezes — a real pass ticks every second.</p>'
      :fail?'<p class="hint">This vehicle did not pass inspection. Not cleared to race.</p>'
      :'<div><img src="'+QR_URI+'" style="width:130px;background:#F4F6FA;padding:8px;border-radius:12px;margin:6px 0" alt="pass QR"><p class="hint">Show this to the host at the inspection station to get checked.</p></div>')+
    '<button class="btn line" style="margin-top:10px" onclick="clearInterval(passTimer);this.closest(\'.overlay\').remove()">Close</button></div>';
  }
  draw();clearInterval(passTimer);passTimer=setInterval(draw,1000);
}

function createClan(){

  const id='c'+Date.now();

function drawMap(){
  const cv=$('#mapcv');if(!cv)return;const w=cv.width=cv.clientWidth*2,h=cv.height=cv.clientHeight*2,x=cv.getContext('2d');
  x.fillStyle='#0a0f14';x.fillRect(0,0,w,h);
  x.strokeStyle='rgba(120,140,170,.10)';x.lineWidth=2;
  for(let i=0;i<14;i++){x.beginPath();x.moveTo(i*w/14,0);x.lineTo(i*w/14,h);x.stroke();
    x.beginPath();x.moveTo(0,i*h/14);x.lineTo(w,i*h/14);x.stroke();}
  // a few "main roads"
  x.strokeStyle='rgba(242,179,61,.22)';x.lineWidth=8;
  [[0.1,0.8,0.9,0.2],[0.15,0.15,0.7,0.95],[0.05,0.5,0.95,0.55]].forEach(([x1,y1,x2,y2])=>{
    x.beginPath();x.moveTo(x1*w,y1*h);x.lineTo(x2*w,y2*h);x.stroke();});
  x.strokeStyle='rgba(232,54,45,.35)';x.lineWidth=3;
  x.beginPath();x.arc(w*0.6,h*0.3,10,0,7);x.stroke();
}

function useGPS(){
  if(!navigator.geolocation)return toast('No GPS on this device.');
  toast('Getting your location…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const u=S.users[S.me];u.loc=u.loc||{};u.loc.lat=pos.coords.latitude;u.loc.lng=pos.coords.longitude;
    u.loc.visible=true;u.loc.area='Live GPS';
    // map lat/lng into the stylized board (rough PR bounds)
    u.loc.x=Math.max(6,Math.min(94,((pos.coords.longitude+67.3)/(66-67.3+1.3))*100));
    u.loc.y=Math.max(6,Math.min(94,(1-((pos.coords.latitude-17.85)/(18.55-17.85)))*100));
    save();if(CLOUD)cloudPut('loc',S.me,{id:S.me,nick:u.nick,x:u.loc.x,y:u.loc.y,lat:u.loc.lat,lng:u.loc.lng,visible:true,area:'Live GPS',master:u.master,prestige:u.prestige,xp:u.xp});
    render();toast('📍 You\'re live on the map by real GPS.');
  },err=>toast('Location denied — turn on GPS/permissions.'),{enableHighAccuracy:true,timeout:10000});
}

        if(hit){notify('🔖 New match for "'+(hit.q||hit.cat)+'": '+(d.title||'')+' — '+fmt(d.price));renderNotifDot();
          pushLocal('Saved search match 🔖',(d.title||'')+' · '+fmt(d.price));}}
      if(world==='market'&&tab==='market'&&view.name==='tab')render();}
  }).subscribe();
  }catch(e){console.warn('realtime',e)}
}
function renderNotifDot(){const b=document.getElementById('notifdot');if(b)b.style.display='block';}
function cloudSaveMe(){
  if(!CLOUD||!S.me)return;clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{const u=S.users[S.me];if(!u)return;
    // never publish email into the public-read profile blob
    const blob=Object.assign({},u);delete blob.email;
    // master/founder are set by the server trigger, not trusted from the client
    try{const {error}=await sb.from('profiles').update({nick:u.nick,prestige:u.prestige||0,xp:u.xp||0,
      eq_name:u.eqName||null,bio:u.bio||'',data:blob}).eq('id',S.me);
      if(error)syncWarn();}catch(e){syncWarn();}
  },800);
}
async function cloudUpdateListing(l){
  if(!CLOUD)return;
  const blob=Object.assign({},l);
  try{const {error}=await sb.from('listings').update({price:l.price,title:l.title,data:blob})
    .eq('seller',S.me).eq('data->>id',l.id);if(error)syncWarn();}catch(e){syncWarn();}
}
async function cloudBumpView(lid){
  if(!CLOUD)return;
  // atomic increment via RPC if present; otherwise best-effort read+write
  try{const {error}=await sb.rpc('bump_view',{lid});if(!error)return;}catch(e){}
  try{const {data}=await sb.from('listings').select('data').eq('data->>id',lid).maybeSingle();
    if(data&&data.data){data.data.views=(data.data.views||0)+1;
      await sb.from('listings').update({data:data.data}).eq('data->>id',lid);}}catch(e){}
}
async function cloudPublishListing(l){
  if(!CLOUD)return;
  try{await sb.from('listings').insert({seller:S.me,category:l.cat,title:l.title,model:l.model,price:l.price,
    location:l.loc,miles:l.miles,title_status:l.titleStatus,vin:l.vin,description:l.desc,data:l});}catch(e){toast('Cloud save failed — saved locally.')}
}
async function cloudPublishEvent(ev){
  if(!CLOUD)return;
  try{await sb.from('events').insert({host:S.me,type:ev.type,title:ev.title,venue:ev.venue,description:ev.desc,sanctioned:true,data:ev});}catch(e){}
}
async function cloudUpload(file){
  if(!CLOUD)return null;
  try{const path=S.me+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.jpg';
    const {error}=await sb.storage.from('photos').upload(path,file,{upsert:true});
    if(error)return null;return sb.storage.from('photos').getPublicUrl(path).data.publicUrl;
  }catch(e){return null}
}
async function cloudSignup(first,last,nick,email,pw){
  return await sb.auth.signUp({email,password:pw,options:{data:{first,last,nick}}});
}
async function cloudLogin(email,pw){return await sb.auth.signInWithPassword({email,password:pw});}
async function cloudBoot(){
  if(!cloudReady())return;
  sb.auth.onAuthStateChange((event)=>{if(event==='PASSWORD_RECOVERY'){view={name:'auth-reset'};render();}});
  try{const {data}=await sb.auth.getSession();
    if(data.session){await cloudLoadMe();await cloudLoadShared();cloudRealtime();
      tab='market';view={name:'tab'};openDeep&&openDeep();askPush();}
    else{
      // no session → GUEST mode: browse the live market without an account
      S.me=null;await cloudLoadShared();cloudRealtime();
      tab='market';if(view.name!=='auth-reset')view={name:'tab'};openDeep&&openDeep();
    }
  }catch(e){console.warn('cloudBoot',e)}
  deepSettled=true;openDeep();   // shared listing/profile links resolve once cloud data has landed
  render();
}

/* =================== BOOT =================== */
let world='market',ptab='home',unlocked=false;
let deepU=new URLSearchParams(location.search).get('u');
let deepL=new URLSearchParams(location.search).get('l');
let deepSettled=false;   // boot resets view several times; keep the target until cloud data has landed
function openDeep(){
  let hit=false;
  if(deepL){const dl=S.listings.find(x=>String(x.id)===String(deepL));
    if(dl){world='market';view={name:'listing',arg:dl.id};hit=true}}
  if(!hit&&deepU){const du=Object.values(S.users).find(x=>x.profileNo===deepU);
    if(du){world='market';view={name:'user',arg:du.id};hit=true}}
  if(deepSettled){deepL=null;deepU=null}   // only forget it once boot can no longer clobber the view
  return hit;
}
if(window.supabase&&window.supabase.createClient){
  // CLOUD MODE — real accounts + shared data
  cloudReady();
  // hydrate from the last-synced local cache so an offline/slow launch shows real data (not a blank grid)
  const cached=(()=>{try{return JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){return null}})();
  if(cached&&cached.users&&(!cached.me||cached.users[cached.me])){
    S=cached;S.threads=S.threads||[];S.merch=S.merch||[];S.orders=S.orders||[];S.reports=S.reports||[];S.flags=S.flags||{};
    tab='market';view={name:'tab'};openDeep();render();
  }else{
    S={me:null,users:{},listings:[],events:[],clans:[],queue:[],challenges:[],announcements:[],paddockChat:[],threads:[],merch:[],orders:[],notifs:[],reports:[],flags:{},clubPass:'redline',pno:1};
    tab='market';view={name:'tab'};render();
  }
  cloudBoot();
  // reconcile when connectivity returns
  window.addEventListener('online',()=>{if(CLOUD){cloudLoadShared().then(()=>render());toast('Back online — syncing 🏁')}});
}else{
  // LOCAL DEMO MODE (offline / artifact preview)
  load();
  deepSettled=true;
  if(S.me){tab='market';view={name:'tab'};openDeep();}
  render();
}
</script>

<script>
/* =================== PWA — install to home screen =================== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW register failed',e));
  });
}
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredInstall=e;
  if(localStorage.getItem('pl_install_dismissed'))return;
  const b=document.createElement('div');
  b.id='installbar';
  b.style.cssText='position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:10px;background:#1B1F27;border:1px solid #272D38;border-radius:14px;padding:10px 12px;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:460px;width:calc(100% - 32px)';
  b.innerHTML='<img src="icon-192.png" alt="" style="width:38px;height:38px;border-radius:9px">'+
    '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">Install PitLane</div>'+
    '<div style="font-size:12px;color:#8B94A6">Full-screen app on your home screen</div></div>'+
    '<button onclick="doInstall()" style="background:#E8362D;color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px">Install</button>'+
    '<button onclick="dismissInstall()" aria-label="Dismiss" style="color:#8B94A6;font-size:18px;padding:4px 6px">&#10005;</button>';
  document.body.appendChild(b);
});
function doInstall(){
  const b=document.getElementById('installbar');if(b)b.remove();
  if(!deferredInstall)return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(()=>{deferredInstall=null;});
}
function dismissInstall(){
  const b=document.getElementById('installbar');if(b)b.remove();
  localStorage.setItem('pl_install_dismissed','1');
}
window.addEventListener('appinstalled',()=>{
  const b=document.getElementById('installbar');if(b)b.remove();
  if(typeof toast==='function')toast('PitLane installed 🏁');
});
</script>
